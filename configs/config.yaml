app:
  name: arbitrage

rpc:
  url: "https://eth-mainnet.g.alchemy.com/v2/your-api-key"
  ws_url: wss://your-provider.example/v2/your-api-key  # Only used for subscribing to new blocks

persistence:
  # When true, store pools, snapshots, checkpoints, and opportunities in memory only.
  memory: false
  database:
    url: "postgres://postgres:postgres@localhost:5432/arbitrage?sslmode=disable"
  redis:
    url: "redis://localhost:6379/0"

blockchain:
  factory_address: "0x1F98431c8aD98523631AE4a59f267346ea31F984"
  multicall_address: "0xcA11bde05977b3631167028862bE2a173976CA11"
  pool_manager_address: "0x000000000004444c5dc75cB358380D2e3dE08A90"
  state_view_address: "0x7ffe42c4a5deea5b0fec41c94c136cf115597227"
  balancer_vault_address: "0xBA12222222228d8Ba445958a75a0704d566BF2C8"
  balancer_vault_v3_address: "0xbA1333333333a1BA1108E8412f11850A5C319bA9"

sync:
  catchup_batch_size: 2000
  snapshot_interval: 5000
  snapshot_fallback: 10m
  reorg_max_depth: 128
  catchup_pool_group_size: 100   # Maximum number of pools per group
  catchup_block_span: 100        # Maximum block span within a group
  catchup_header_concurrency: 16 # Maximum number of empty block headers to fetch concurrently
  bootstrap_stale_block_threshold: 1000

  univ3:
    enabled: true
    pools:
      - address: "0x88e6A0c2dDD26FEEb64F039a2c41296Fb728693B"
        fee: 500
    subgraph:
      enabled: true
      endpoint: "https://gateway.thegraph.com/api/<YOUR_API_KEY_HERE>/subgraphs/id/5zvR82QoaXYFyDEKLZ9t6v9adgnptxYpKpSbxtgVENFV"
      refresh_interval: 10m
      first: 100
      skip: 0
      order_by: volume24h
      order_direction: desc
      min_total_value_locked_usd: "1000000"
      min_volume_24h_usd: "200000"
      token0: ""
      token1: ""
      fee_tiers: [500, 3000, 10000]

  pancakev3:
    enabled: false
    pools: []
    subgraph:
      enabled: false
      endpoint: "https://gateway.thegraph.com/api/<YOUR_API_KEY_HERE>/subgraphs/id/JAGXF8B14mpB8QGKnwhKTs5JxsQZBJQvbDGFcWwL7gbm"
      refresh_interval: 10m
      first: 100
      skip: 0
      order_by: volume24h
      order_direction: desc
      min_total_value_locked_usd: "1000000"
      min_volume_24h_usd: "200000"
      token0: ""
      token1: ""
      fee_tiers: [500, 2500, 10000]

  univ4:
    enabled: false
    poolmanager:
      pools: []
      # Example:
      # - currency0: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"
      #   currency1: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
      #   fee: 500
      #   tick_spacing: 10
      #   hooks: "0x0000000000000000000000000000000000000000"
    subgraph:
      enabled: false
      endpoint: "https://gateway.thegraph.com/api/<YOUR_API_KEY_HERE>/subgraphs/id/DiYPVdygkfjDWhbxGSqAQxwBKmfKnkWQojqeM2rkLb3G"
      refresh_interval: 10m
      first: 100
      skip: 0
      order_by: volume24h
      order_direction: desc
      min_total_value_locked_usd: "1000000"
      min_volume_24h_usd: "200000"
      token0: ""
      token1: ""
      fee_tiers: [500, 3000, 10000]
      hooks:
        - "0x0000000000000000000000000000000000000000"

  balancer:
    enabled: false
    pools: []
      # Example:
      # - id: "0x5c6ee304399dbdb9c8ef030ab642b10820db8f56000200000000000000000014"
      #   address: "0x5c6Ee304399dbdb9c8ef030ab642b10820Db8F560"
      #   type: weighted
      # - id: "0x..."
      #   address: "0x..."
      #   vault: "0xBA12222222228d8Ba445958a75a0704d566BF2C8"  # optional, defaults to balancer_vault_address
      #   type: stable
    subgraph:
      enabled: false
      schema: v3   # v2 for balancer-v2 subgraph; v3 for v3-pools endpoints (auto-detected from URL when omitted)
      endpoint: "https://api.subgraph.ormilabs.com/api/public/717cf785-de57-4761-94dd-9ac51b019902/subgraphs/v3-pools-mainnet-smol/latest/gn"
      refresh_interval: 10m
      first: 100
      skip: 0
      order_by: id
      order_direction: desc
      min_total_value_locked_usd: "300000"
      min_volume_24h_usd: "200000"
      token0: ""
      token1: ""
      pool_types: ["Weighted", "Stable"]

http:
  enabled: true
  addr: ":8080"

quote:
  max_hops: 3

# Arbitrage discovery runs after each synced block via ChangedPoolsListener.
arbitrage:
  triangle:
    # Enable A->B->C->A triangular arbitrage scanning.
    enabled: false
    # Base tokens to search triangular routes from. Requires synced pools forming closed loops.
    start_tokens:
      - "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"  # USDC
      - "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"  # WETH
    # Minimum net profit in wei after gas to accept an opportunity.
    min_net_profit_wei: "1000000"
    # Optimizer input amount search bounds (wei).
    min_amount: "1000000"
    max_amount: "100000000000000"
    optimizer_iterations: 16

log:
  level: info
  format: console   # console | json
  file: logs/arbitrage.log
  error_file: logs/arbitrage.error.log
